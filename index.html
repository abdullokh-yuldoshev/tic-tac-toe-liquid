<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Tic-Tac-Toe Liquid Premium</title>
  <link rel="stylesheet" href="css/style.css?v=2.1.0">
</head>
<body>
  <div class="app">
    <div class="stage" id="stage">
      <div id="game-container">
        <div class="status-bar">
          <span id="status">Ходит X</span>
          <button id="btnExit" class="btn-mini">Выйти</button>
        </div>
        <div id="board" class="board"></div>
        <div class="controls">
          <button id="btnUndo" class="btn">← Отмена</button>
          <button id="btnReset" class="btn">↻ Заново</button>
        </div>
        <button id="btnSave" class="btn-main">Сохранить</button>
      </div>
    </div>
    
    <div class="tabbar">
      <button id="tabMain" class="tab-item active">Главная</button>
      <button id="tabSettings" class="tab-item">Настройки</button>
    </div>
  </div>

  <div id="settings-screen" style="display:none; padding: 20px;">
    <div class="field">
      <div class="label" id="lblTheme">Тема</div>
      <select id="selTheme">
        <option value="light">Светлая</option>
        <option value="dark">Тёмная</option>
        <option value="gold">Золотая</option>
      </select>
    </div>
  </div>
  
  <div class="toast" id="toast">Сохранено</div>
  <script type="module" src="js/game.js?v=2.1.0"></script>
</body>
</html>
