<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="description" content="Tic-Tac-Toe Liquid Premium — ультра-премиальная игра с дизайном Liquid Glass, Gold-темой и поддержкой Telegram WebApp." />
  <title>Tic-Tac-Toe – Alex Edition</title>
  <link rel="stylesheet" href="css/style.css?v=3.8.0">
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>
  <canvas id="confettiCanvas"></canvas>

  <div class="app">
    <div class="stage">

      <!-- SCREEN: HOME -->
      <div id="screenHome" class="center-col">
        <div class="glass-panel hero">
          <div class="top-controls-panel" style="position: absolute; top: 12px; right: 12px; display: flex; gap: 8px; z-index: 110;">
             
             <button id="btnSoundToggle" type="button" style="background: rgba(255,255,255,0.12); border: 1px solid var(--glass-border); border-radius: 50%; width: 34px; height: 34px; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--glass-shadow); transition: transform 0.2s;">🔊</button>

             <div class="dropdown-wrap" style="position: relative;">
               <button id="btnThemeToggle" type="button" style="background: rgba(255,255,255,0.12); border: 1px solid var(--glass-border); border-radius: 50%; width: 34px; height: 34px; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--glass-shadow); transition: transform 0.2s;">☀️</button>
               <div id="themeMenu" class="glass-panel hidden" style="position: absolute; top: 40px; right: 0; padding: 6px; display: flex; flex-direction: column; gap: 4px; min-width: 120px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); z-index: 120;">
                 <button class="btn-theme-item" data-theme="light" style="background: transparent; border: none; font-size: 13px; color: var(--text); padding: 6px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 8px; font-weight: 500;"><span style="font-size:16px;">☀️</span> <span class="theme-txt-light">Светлая</span></button>
                 <button class="btn-theme-item" data-theme="dark" style="background: transparent; border: none; font-size: 13px; color: var(--text); padding: 6px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 8px; font-weight: 500;"><span style="font-size:16px;">🌙</span> <span class="theme-txt-dark">Тёмная</span></button>
                 <button class="btn-theme-item" data-theme="gold" style="background: transparent; border: none; font-size: 13px; color: var(--text); padding: 6px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 8px; font-weight: 500;"><span style="font-size:16px;">👑</span> <span class="theme-txt-gold">Золотая</span></button>
               </div>
             </div>

             <div class="dropdown-wrap" style="position: relative;">
               <button id="btnLangToggle" type="button" style="background: rgba(255,255,255,0.12); border: 1px solid var(--glass-border); border-radius: 50%; width: 34px; height: 34px; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--glass-shadow); transition: transform 0.2s;">🇷🇺</button>
               <div id="langMenu" class="glass-panel hidden" style="position: absolute; top: 40px; right: 0; padding: 6px; display: flex; flex-direction: column; gap: 4px; min-width: 120px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); z-index: 120;">
                 <button class="btn-lang-item" data-lang="ru" style="background: transparent; border: none; font-size: 13px; color: var(--text); padding: 6px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 8px; font-weight: 500;"><span style="font-size:18px;">🇷🇺</span> Русский</button>
                 <button class="btn-lang-item" data-lang="en" style="background: transparent; border: none; font-size: 13px; color: var(--text); padding: 6px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 8px; font-weight: 500;"><span style="font-size:18px;">🇺🇸</span> English</button>
                 <button class="btn-lang-item" data-lang="uz" style="background: transparent; border: none; font-size: 13px; color: var(--text); padding: 6px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 8px; font-weight: 500;"><span style="font-size:18px;">🇺🇿</span> O'zbek</button>
               </div>
             </div>

          </div>
          <div class="heroEmoji">✦</div>
          <div class="heroTitle">Tic-Tac-Toe<br><span class="heroEdition">Alex Edition</span></div>
          <div class="heroMeta" id="homeMeta">...</div>

          <div style="margin-top: 14px; padding: 10px; background: rgba(120, 120, 128, 0.05); border: 1px solid var(--glass-border); border-radius: 12px; width: 100%; box-sizing: border-box;">
             <div style="display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; margin-bottom: 4px;">
                <span id="lblCareerTitle">Уровень Карьеры: 1</span>
                <span id="lblCareerXp">XP: 0/100</span>
             </div>
             <div style="width: 100%; height: 6px; background: rgba(0,0,0,0.1); border-radius: 4px; overflow: hidden;">
                <div id="careerProgressFill" style="width: 0%; height: 100%; background: var(--accent-grad, #007aff); transition: width 0.4s ease;"></div>
             </div>
          </div>

          <div class="heroActions">
            <button id="btnStart" class="btn btnPrimary" type="button">
              ▶ Начать игру
            </button>
            <button id="btnInfo" class="btn btnSec" type="button" style="margin-top: 12px;">ℹ Об авторе</button>
          </div>
        </div>


      </div>

      <!-- SCREEN: SETTINGS -->
      <div id="screenSettings" class="center-col hidden">
        <div class="glass-panel">
          <div class="panelHeader">
            <div class="panelTitle" id="settingsTitle">Настройки</div>
          </div>

          <div style="margin-bottom: 20px; padding: 12px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: var(--glass-shadow);">
            <div class="label" id="lblStatsTitle" style="margin-bottom: 6px; font-weight: 700;">Статистика</div>
            <div style="display: flex; justify-content: space-between; font-size: 13px; opacity: 0.95;">
              <span id="statTotal">Всего: 0</span>
              <span id="statWins">Побед: 0</span>
              <span id="statWinrate">Винрейт: 0%</span>
            </div>
          </div>



          <div class="field">
            <div class="label" id="lblMatchMod">Тип матча</div>
            <select id="selMatchMode"></select>
          </div>

          <div class="field">
            <div class="label" id="lblMode">Режим игры</div>
            <select id="selMode"></select>
          </div>

          <div class="grid2">
            <div class="field">
              <div class="label" id="lblSize">Поле</div>
              <select id="selSize"></select>
            </div>
            <div class="field">
              <div class="label" id="lblGoal">Цель (в ряд)</div>
              <select id="selGoal"></select>
            </div>
          </div>

          <div class="field" id="aiRow">
            <div class="label" id="lblAI">Сложность ИИ</div>
            <select id="selAI"></select>
          </div>

          <div class="divider"></div>

          <div class="field">
            <div class="label" id="lblNames" style="margin-bottom: 10px;">Имена игроков</div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
              <div style="display: flex; gap: 8px; align-items: center;">
                <input id="inpSym1" placeholder="❌" style="width: 50px; text-align: center; font-size: 18px; padding: 10px 0; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid var(--glass-border);" />
                <input id="inpP1" placeholder="Игрок 1" style="flex: 1; padding: 10px 12px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid var(--glass-border);" />
              </div>
              <div style="display: flex; gap: 8px; align-items: center;">
                <input id="inpSym2" placeholder="⭕" style="width: 50px; text-align: center; font-size: 18px; padding: 10px 0; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid var(--glass-border);" />
                <input id="inpP2" placeholder="Игрок 2" style="flex: 1; padding: 10px 12px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid var(--glass-border);" />
              </div>
              <div id="rowP3" style="display: flex; gap: 8px; align-items: center;">
                <input id="inpSym3" placeholder="🔺" style="width: 50px; text-align: center; font-size: 18px; padding: 10px 0; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid var(--glass-border);" />
                <input id="inpP3" placeholder="Игрок 3" style="flex: 1; padding: 10px 12px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid var(--glass-border);" />
              </div>
              <div id="rowP4" style="display: flex; gap: 8px; align-items: center;">
                <input id="inpSym4" placeholder="🟩" style="width: 50px; text-align: center; font-size: 18px; padding: 10px 0; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid var(--glass-border);" />
                <input id="inpP4" placeholder="Игрок 4" style="flex: 1; padding: 10px 12px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid var(--glass-border);" />
              </div>
            </div>
          </div>

          <div class="saveWrap">
            <button id="btnSave" class="btn btnPrimary" style="width:100%" type="button">Сохранить настройки</button>
            <button id="btnCreateOnline" class="btn btnPrimary" style="margin-top: 10px; background: linear-gradient(135deg, #11998e, #38ef7d); width: 100%;">🌐 Создать сетевую комнату с этими настройками</button>
          </div>
        </div>


      </div>

      <!-- SCREEN: GAME -->
      <div id="screenGame" class="center-col hidden">
        <div class="glass-panel">
          <div class="gameTop">
            <div class="gameTopInfo">
              <div class="turnTitle" id="turnTitle">Ходит X</div>
              <div class="status" id="turnSub">...</div>
            </div>
            <button class="btn btnSec btnExit" id="btnExit" type="button">Выйти</button>
          </div>
          
          <div id="gameAbilitiesBar" class="player-abilities-bar"></div>

          <div class="board-frame">
            <div class="board" id="board"></div>
          </div>

          <div class="gameActions">
            <button class="btn btnSec" id="btnUndo" type="button">↩ Отмена</button>
            <button class="btn btnSec" id="btnRestart" type="button">⟲ Заново</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- MODAL -->
  <div class="modalBack" id="modalBack">
    <div class="modal">
      <div class="modalTitle" id="modalTitle">...</div>
      <div class="modalText" id="modalText">...</div>
      <div class="modalBtns">
        <button class="btnModal btnCancel" id="modalCancel" type="button">Отмена</button>
        <button class="btnModal btnOk" id="modalOk" type="button">ОК</button>
      </div>
    </div>
  </div>

  <!-- GLOBAL TABBAR -->
  <div class="tabbar-global" id="tabbarGlobal">
    <div class="tabbar">
      <div class="tabbar-indicator" id="tabIndicator"></div>
      <button id="tabHome" class="tab tabOn" type="button" data-screen="home">Главная</button>
      <button id="tabSettings" class="tab" type="button" data-screen="settings">Настройки</button>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast">Сохранено</div>

  <div id="screenDraft" class="screen-draft hidden">
    <div class="glass-panel" style="flex: 1; display: flex; flex-direction: column; justify-content: flex-start; height: 100%;">
      <div>
        <div id="draftTitle" style="font-size: 22px; font-weight: bold; text-align: center; margin-bottom: 4px; color: var(--text);">Выбор способностей</div>
        <div id="draftSubtitle" style="font-size: 14px; opacity: 0.8; text-align: center; margin-bottom: 20px; color: var(--gold);">Ход: Игрок 1 (0/3)</div>
      </div>
      <div id="draftGrid" style="display: flex; flex-direction: column; gap: 6px; overflow-y: auto; height: 58vh; max-height: 58vh; padding: 4px 8px; width: 100%; box-sizing: border-box; -webkit-overflow-scrolling: touch;"></div>
    </div>
  </div>

  <div id="netModal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:9999;">
    <div class="glass-panel" style="padding:20px; text-align:center; max-width:90%; width:320px;">
      <div id="netStatusTitle" style="font-weight:700; font-size:18px; margin-bottom:10px; color:var(--text);">Создание комнаты...</div>
      <div id="netStatusDesc" style="font-size:12px; opacity:0.8; margin-bottom:15px; color:var(--text); word-break:break-all;">Генерируем P2P ссылку...</div>
      <button id="btnCopyNetLink" class="btn btnPrimary" style="font-size:12px; padding:8px; display:none; margin-bottom:10px; width:100%;">📋 Копировать ссылку</button>
      <button id="btnCancelNet" class="btn btnSec" style="font-size:12px; padding:6px 12px; width:100%;">Отмена</button>
    </div>
  </div>

  <script src="js/game.js?v=3.8.0"></script>
</body>
</html>
