<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="description" content="Tic-Tac-Toe Liquid Premium — ультра-премиальная игра с дизайном Liquid Glass, Gold-темой и поддержкой Telegram WebApp." />
  <title>Tic-Tac-Toe – Alex Edition</title>
  <link rel="stylesheet" href="css/style.css?v=3.5.4">
</head>

<body>
  <canvas id="confettiCanvas"></canvas>

  <div class="app">
    <div class="stage">

      <!-- SCREEN: HOME -->
      <div id="screenHome" class="center-col">
        <div class="glass-panel hero">
          <div class="lang-dropdown-wrap" style="position: absolute; top: 12px; right: 12px; z-index: 110;">
             <button id="btnLangToggle" type="button" style="background: rgba(255,255,255,0.12); border: 1px solid var(--glass-border); border-radius: 50%; width: 34px; height: 34px; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--glass-shadow); transition: transform 0.2s;">
               🇷🇺
             </button>
             <div id="langMenu" class="glass-panel hidden" style="position: absolute; top: 40px; right: 0; padding: 6px; display: flex; flex-direction: column; gap: 4px; min-width: 50px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); z-index: 120;">
               <button class="btn-lang-item" data-lang="ru" style="background: transparent; border: none; font-size: 20px; padding: 6px; cursor: pointer; transition: transform 0.15s;">🇷🇺</button>
               <button class="btn-lang-item" data-lang="en" style="background: transparent; border: none; font-size: 20px; padding: 6px; cursor: pointer; transition: transform 0.15s;">🇺🇸</button>
               <button class="btn-lang-item" data-lang="uz" style="background: transparent; border: none; font-size: 20px; padding: 6px; cursor: pointer; transition: transform 0.15s;">🇺🇿</button>
             </div>
          </div>
          <div class="heroEmoji">✦</div>
          <div class="heroTitle">Tic-Tac-Toe<br><span class="heroEdition">Alex Edition</span></div>
          <div class="heroMeta" id="homeMeta">...</div>

          <div style="margin-top: 14px; padding: 10px; background: rgba(120, 120, 128, 0.05); border: 1px solid var(--glass-border); border-radius: 12px; width: 100%; box-sizing: border-box;">
             <div style="display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; margin-bottom: 4px;">
                <span id="lblCareerTitle">Уровень Карьеры: 1</span>
                <span id="lblCareerXp">XP: 0/100</span>
             </div>
             <div style="width: 100%; height: 6px; background: rgba(0,0,0,0.1); border-radius: 4px; overflow: hidden;">
                <div id="careerProgressFill" style="width: 0%; height: 100%; background: var(--accent-grad, #007aff); transition: width 0.4s ease;"></div>
             </div>
          </div>

          <div class="heroActions">
            <button id="btnStart" class="btn btnPrimary" type="button">
              ▶ Начать игру
            </button>
            <button id="btnInfo" class="btn btnSec" type="button" style="margin-top: 12px;">ℹ Об авторе</button>
          </div>
        </div>


      </div>

      <!-- SCREEN: SETTINGS -->
      <div id="screenSettings" class="center-col hidden">
        <div class="glass-panel">
          <div class="panelHeader">
            <div class="panelTitle" id="settingsTitle">Настройки</div>
          </div>

          <div style="margin-bottom: 20px; padding: 12px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: var(--glass-shadow);">
            <div class="label" id="lblStatsTitle" style="margin-bottom: 6px; font-weight: 700;">Статистика</div>
            <div style="display: flex; justify-content: space-between; font-size: 13px; opacity: 0.95;">
              <span id="statTotal">Всего: 0</span>
              <span id="statWins">Побед: 0</span>
              <span id="statWinrate">Винрейт: 0%</span>
            </div>
          </div>

          <div class="grid2">
            <div class="field">
              <div class="label" id="lblTheme">Тема</div>
              <select id="selTheme">
                <option value="light">Светлая</option>
                <option value="dark">Тёмная</option>
                <option value="gold">Золотая</option>
              </select>
            </div>
          </div>

          <div class="field">
            <div class="label" id="lblSound">Звук</div>
            <button id="btnSoundToggle" class="btn btnSec soundToggle" type="button">
              <span id="soundStatusText">Включен</span>
              <span id="soundIcon" class="icon-wrap"></span>
            </button>
          </div>

          <div class="field">
            <div class="label" id="lblMode">Режим игры</div>
            <div class="chips" id="modeChips"></div>
          </div>

          <div class="grid2">
            <div class="field">
              <div class="label" id="lblSize">Поле</div>
              <select id="selSize"></select>
            </div>
            <div class="field">
              <div class="label" id="lblGoal">Цель (в ряд)</div>
              <select id="selGoal"></select>
            </div>
          </div>

          <div class="field" id="aiRow">
            <div class="label" id="lblAI">Сложность ИИ</div>
            <select id="selAI"></select>
          </div>

          <div class="divider"></div>

          <div class="field">
            <div class="label" id="lblNames">Имена игроков</div>
            <div class="grid2">
              <input id="inpP1" maxlength="10" placeholder="Игрок 1" />
              <input id="inpP2" maxlength="10" placeholder="Игрок 2" />
            </div>
            <div class="grid2 mt12" id="nameGrid34" style="display:none;">
              <input id="inpP3" maxlength="10" placeholder="Игрок 3" />
              <input id="inpP4" maxlength="10" placeholder="Игрок 4" />
            </div>
            <div style="margin-top: 12px;">
              <div class="label" id="lblCustomSym">Символы игроков (Эмодзи)</div>
              <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;">
                 <input id="inpSym1" placeholder="❌" style="text-align: center; font-size: 20px; padding: 8px 0;" />
                 <input id="inpSym2" placeholder="⭕" style="text-align: center; font-size: 20px; padding: 8px 0;" />
                 <input id="inpSym3" placeholder="🔺" style="text-align: center; font-size: 20px; padding: 8px 0;" />
                 <input id="inpSym4" placeholder="🟩" style="text-align: center; font-size: 20px; padding: 8px 0;" />
              </div>
            </div>
          </div>

          <div class="saveWrap">
            <button id="btnSave" class="btn btnPrimary" style="width:100%" type="button">Сохранить настройки</button>
          </div>
        </div>


      </div>

      <!-- SCREEN: GAME -->
      <div id="screenGame" class="center-col hidden">
        <div class="glass-panel">
          <div class="gameTop">
            <div class="gameTopInfo">
              <div class="turnTitle" id="turnTitle">Ходит X</div>
              <div class="status" id="turnSub">...</div>
            </div>
            <button class="btn btnSec btnExit" id="btnExit" type="button">Выйти</button>
          </div>

          <div class="board-frame">
            <div class="board" id="board"></div>
          </div>

          <div class="gameActions">
            <button class="btn btnSec" id="btnUndo" type="button">↩ Отмена</button>
            <button class="btn btnSec" id="btnRestart" type="button">⟲ Заново</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- MODAL -->
  <div class="modalBack" id="modalBack">
    <div class="modal">
      <div class="modalTitle" id="modalTitle">...</div>
      <div class="modalText" id="modalText">...</div>
      <div class="modalBtns">
        <button class="btnModal btnCancel" id="modalCancel" type="button">Отмена</button>
        <button class="btnModal btnOk" id="modalOk" type="button">ОК</button>
      </div>
    </div>
  </div>

  <!-- GLOBAL TABBAR -->
  <div class="tabbar-global" id="tabbarGlobal">
    <div class="tabbar">
      <div class="tabbar-indicator" id="tabIndicator"></div>
      <button id="tabHome" class="tab tabOn" type="button" data-screen="home">Главная</button>
      <button id="tabSettings" class="tab" type="button" data-screen="settings">Настройки</button>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast">Сохранено</div>

  <script type="module" src="js/game.js?v=3.5.4"></script>
</body>
</html>
